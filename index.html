<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060608">
<title>Wanderly</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<style>:root {
  --bg: #060608;
  --card: #16161c;
  --card2: #1e1e26;
  --line: #2a2a33;
  --text: #f2f2f7;
  --muted: #8e8e99;
  --blue: #1e7bff;
  --green: #30d158;
  --amber: #ff9f0a;
  --red: #ff453a;
  --purple: #7b4dff;
  --gold: linear-gradient(135deg, #f5d06f, #c99a2e);
  --radius: 18px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

#app { display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; position: relative; }

/* ---------- Top bar ---------- */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 12px; }
.brand { display: flex; align-items: center; gap: 8px; }
.brand-ico { font-size: 22px; }
.brand-name { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.diary-badge {
  background: var(--gold); color: #2b1d00;
  font-size: 10px; font-weight: 800; letter-spacing: 1px;
  padding: 3px 8px; border-radius: 999px;
}
.top-right { display: flex; align-items: center; gap: 12px; }
.today { color: var(--muted); font-size: 13px; }
.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, #1e7bff, #7b4dff);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
}

/* ---------- Tabs ---------- */
main { flex: 1; overflow: hidden; position: relative; }
.tab { display: none; height: 100%; overflow-y: auto; padding: 4px 16px 90px; }
.tab.active { display: block; }

.tabbar {
  display: flex; border-top: 1px solid var(--line);
  background: rgba(10,10,14,0.95); backdrop-filter: blur(12px);
  padding: 8px 0 14px;
}
.tabbtn {
  flex: 1; background: none; border: none; color: var(--muted);
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
}
.tabbtn .tab-ico { font-size: 20px; filter: grayscale(1) opacity(0.6); }
.tabbtn.active { color: var(--blue); }
.tabbtn.active .tab-ico { filter: none; }

.section-title {
  font-size: 13px; font-weight: 700; letter-spacing: 1.2px;
  color: var(--muted); text-transform: uppercase;
  margin: 20px 6px 10px;
  display: flex; align-items: center; gap: 8px;
}
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 1.6s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* ---------- FAB ---------- */
.fab {
  position: absolute; right: 20px; bottom: 86px; z-index: 30;
  width: 54px; height: 54px; border-radius: 50%;
  background: linear-gradient(135deg, #1e7bff, #7b4dff);
  color: #fff; font-size: 28px; line-height: 1; border: none; cursor: pointer;
  box-shadow: 0 6px 24px rgba(30,123,255,0.45);
  transition: transform 0.12s;
}
.fab:hover { transform: scale(1.06); }

/* ---------- Trip cards ---------- */
.trip-card {
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
  overflow: hidden; margin-bottom: 14px; cursor: pointer;
  transition: transform 0.12s, border-color 0.12s;
}
.trip-card:hover { transform: translateY(-1px); border-color: #3a3a46; }
.trip-cover { position: relative; height: 150px; background: var(--card2); }
.trip-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.trip-cover .cover-shade {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, transparent 30%, rgba(6,6,8,0.85));
}
.trip-cover .trip-emoji {
  position: absolute; top: 12px; left: 12px; font-size: 26px;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.6));
}
.ongoing-pill {
  position: absolute; top: 14px; right: 12px;
  background: var(--green); color: #04310f;
  font-size: 10px; font-weight: 800; letter-spacing: 1px;
  padding: 4px 10px; border-radius: 999px;
  display: flex; align-items: center; gap: 6px;
}
.ongoing-pill::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: #04310f; animation: pulse 1.6s infinite; }
.trip-cover-text { position: absolute; left: 14px; right: 14px; bottom: 10px; }
.trip-title { font-size: 19px; font-weight: 800; letter-spacing: -0.3px; }
.trip-sub { font-size: 13px; color: #cfcfda; margin-top: 2px; }
.trip-meta {
  display: flex; align-items: center; gap: 14px;
  padding: 10px 14px; font-size: 12.5px; color: var(--muted); font-weight: 600;
}
.trip-meta b { color: var(--text); font-weight: 700; }
.trip-meta .spacer { flex: 1; }
.trip-strip { display: flex; gap: 4px; padding: 0 14px 12px; }
.trip-strip img {
  width: 52px; height: 52px; object-fit: cover; border-radius: 8px;
  border: 1px solid var(--line);
}
.strip-more {
  width: 52px; height: 52px; border-radius: 8px; background: var(--card2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--muted);
}

/* ---------- Trip detail sheet ---------- */
.sheet {
  position: absolute; inset: 0; z-index: 40; background: var(--bg);
  animation: slideup 0.22s ease;
}
@keyframes slideup { from { transform: translateY(30px); opacity: 0; } to { transform: none; opacity: 1; } }
.sheet.hidden, .hidden { display: none !important; }
.sheet-body { height: 100%; overflow-y: auto; padding-bottom: 40px; }

.sheet-hero { position: relative; height: 230px; }
.sheet-hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
.sheet-hero .cover-shade { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(6,6,8,0.45), transparent 35%, rgba(6,6,8,0.95)); }
.sheet-back {
  position: absolute; top: 16px; left: 16px; z-index: 2;
  background: rgba(20,20,28,0.75); backdrop-filter: blur(8px);
  border: 1px solid var(--line); color: var(--text);
  border-radius: 999px; padding: 8px 16px; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.sheet-del {
  position: absolute; top: 16px; right: 16px; z-index: 2;
  background: rgba(20,20,28,0.75); backdrop-filter: blur(8px);
  border: 1px solid var(--line); color: var(--red);
  border-radius: 999px; padding: 8px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.sheet-hero-text { position: absolute; left: 18px; right: 18px; bottom: 14px; }
.sheet-hero-text h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
.sheet-hero-text .trip-sub { font-size: 14px; }

.sheet-stats {
  display: flex; gap: 10px; padding: 14px 16px 4px;
}
.stat-chip {
  flex: 1; background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 10px 6px; text-align: center;
}
.stat-chip .n { font-size: 18px; font-weight: 800; }
.stat-chip .l { font-size: 10.5px; color: var(--muted); font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-top: 2px; }

/* ---------- Day timeline inside trip ---------- */
.day-block { padding: 0 16px; }
.day-head {
  display: flex; align-items: baseline; gap: 10px;
  margin: 22px 0 10px;
}
.day-num {
  font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
  color: var(--blue);
}
.day-date { font-size: 13px; color: var(--muted); font-weight: 600; }

.mem-row { display: flex; gap: 12px; }
.mem-rail { display: flex; flex-direction: column; align-items: center; width: 18px; flex-shrink: 0; }
.mem-dot {
  width: 12px; height: 12px; border-radius: 50%;
  border: 2.5px solid var(--blue); background: var(--bg); margin-top: 18px;
}
.mem-line { flex: 1; width: 2px; background: var(--line); margin-top: 4px; }
.mem-row:last-child .mem-line { background: transparent; }

.mem-card {
  flex: 1; background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
  min-width: 0;
}
.mem-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.mem-time { font-size: 12px; font-weight: 700; color: var(--muted); font-variant-numeric: tabular-nums; }
.mem-mood { font-size: 16px; }
.mem-title { font-size: 15.5px; font-weight: 700; letter-spacing: -0.2px; flex: 1; }
.mem-place {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11.5px; font-weight: 600; color: var(--muted);
  background: var(--card2); border-radius: 999px; padding: 3px 9px;
  margin: 4px 0 2px;
}
.mem-note { font-size: 13.5px; line-height: 1.5; color: #c9c9d4; margin-top: 6px; }
.mem-photos { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
.mem-photos img {
  width: 96px; height: 96px; object-fit: cover; border-radius: 10px;
  border: 1px solid var(--line); cursor: pointer;
  transition: transform 0.12s;
}
.mem-photos img:hover { transform: scale(1.04); }
.mem-photos img.wide { width: 100%; height: 160px; }
.mem-del {
  background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 13px; padding: 2px 4px; opacity: 0.5; font-family: inherit;
}
.mem-del:hover { color: var(--red); opacity: 1; }

.add-mem-btn {
  display: block; width: calc(100% - 32px); margin: 18px 16px 0;
  background: var(--card2); border: 1px dashed #3a3a46; color: var(--blue);
  border-radius: var(--radius); padding: 14px; font-size: 14px; font-weight: 700;
  cursor: pointer; font-family: inherit;
}
.add-mem-btn:hover { border-color: var(--blue); }

/* ---------- Global timeline tab ---------- */
.tl-month {
  font-size: 15px; font-weight: 800; letter-spacing: -0.2px;
  margin: 22px 6px 12px; position: sticky; top: 0; z-index: 5;
  background: linear-gradient(180deg, var(--bg) 75%, transparent);
  padding: 6px;
}
.tl-row { display: flex; gap: 12px; }
.tl-rail { display: flex; flex-direction: column; align-items: center; width: 18px; flex-shrink: 0; }
.tl-card {
  flex: 1; display: flex; gap: 12px; background: var(--card);
  border: 1px solid var(--line); border-radius: var(--radius);
  padding: 12px; margin-bottom: 12px; cursor: pointer; min-width: 0;
  transition: border-color 0.12s;
}
.tl-card:hover { border-color: #3a3a46; }
.tl-thumb { width: 74px; height: 74px; border-radius: 12px; object-fit: cover; border: 1px solid var(--line); flex-shrink: 0; }
.tl-thumb-ph {
  width: 74px; height: 74px; border-radius: 12px; background: var(--card2);
  display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0;
}
.tl-info { min-width: 0; flex: 1; }
.tl-date { font-size: 11.5px; font-weight: 700; color: var(--muted); }
.tl-title { font-size: 14.5px; font-weight: 700; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tl-note { font-size: 12.5px; color: var(--muted); margin-top: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.tl-trip {
  display: inline-flex; align-items: center; gap: 5px; margin-top: 6px;
  font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
  background: var(--card2);
}
.tl-trip .swatch { width: 7px; height: 7px; border-radius: 50%; }

/* On this day banner */
.otd {
  background: linear-gradient(135deg, rgba(123,77,255,0.22), rgba(30,123,255,0.18));
  border: 1px solid rgba(123,77,255,0.45);
  border-radius: var(--radius); padding: 14px; margin: 16px 0 4px;
  cursor: pointer;
}
.otd-head { font-size: 12px; font-weight: 800; letter-spacing: 1px; color: #b9a5ff; text-transform: uppercase; margin-bottom: 6px; }
.otd-body { font-size: 14px; font-weight: 600; }
.otd-body span { color: var(--muted); font-weight: 500; }

/* ---------- Stats tab ---------- */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
.stat-card {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 16px;
}
.stat-card .n { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
.stat-card .l { font-size: 11.5px; color: var(--muted); font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-top: 3px; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.bar-label { width: 44px; font-size: 12.5px; font-weight: 700; color: var(--muted); font-variant-numeric: tabular-nums; }
.bar-track { flex: 1; height: 20px; background: var(--card2); border-radius: 6px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #1e7bff, #7b4dff); min-width: 2px; }
.bar-n { width: 60px; font-size: 12px; color: var(--muted); font-weight: 600; }
.country-row {
  display: flex; align-items: center; gap: 12px;
  background: var(--card); border: 1px solid var(--line);
  border-radius: 14px; padding: 12px 14px; margin-bottom: 8px;
}
.country-flag { font-size: 24px; }
.country-name { font-weight: 700; font-size: 14.5px; flex: 1; }
.country-n { font-size: 12.5px; color: var(--muted); font-weight: 600; }

/* ---------- Modal ---------- */
.modal-wrap {
  position: absolute; inset: 0; z-index: 60;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
}
.modal {
  width: 100%; max-width: 560px; max-height: 88%;
  background: var(--card); border: 1px solid var(--line);
  border-radius: 22px 22px 0 0; padding: 20px 18px 28px;
  overflow-y: auto; animation: slideup 0.2s ease;
}
.modal h2 { font-size: 19px; font-weight: 800; margin-bottom: 16px; letter-spacing: -0.3px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11.5px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.field input, .field textarea, .field select {
  width: 100%; background: var(--card2); border: 1px solid var(--line);
  border-radius: 12px; padding: 11px 12px; color: var(--text);
  font-size: 14.5px; font-family: inherit; outline: none;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--blue); }
.field textarea { resize: vertical; min-height: 74px; }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }
.color-opts, .emoji-opts { display: flex; gap: 8px; flex-wrap: wrap; }
.color-dot {
  width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent;
}
.color-dot.sel { border-color: #fff; }
.emoji-opt {
  width: 38px; height: 38px; border-radius: 10px; background: var(--card2);
  border: 1px solid var(--line); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.emoji-opt.sel { border-color: var(--blue); background: rgba(30,123,255,0.15); }
.photo-drop {
  border: 1.5px dashed #3a3a46; border-radius: 14px; padding: 18px;
  text-align: center; color: var(--muted); font-size: 13.5px; font-weight: 600;
  cursor: pointer;
}
.photo-drop:hover { border-color: var(--blue); color: var(--blue); }
.photo-previews { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.photo-previews img { width: 68px; height: 68px; object-fit: cover; border-radius: 10px; border: 1px solid var(--line); }
.modal-btns { display: flex; gap: 10px; margin-top: 18px; }
.btn {
  flex: 1; border: none; border-radius: 14px; padding: 14px;
  font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
}
.btn-primary { background: linear-gradient(135deg, #1e7bff, #7b4dff); color: #fff; }
.btn-primary:disabled { opacity: 0.5; cursor: default; }
.btn-ghost { background: var(--card2); color: var(--muted); }

/* ---------- Lightbox ---------- */
.lightbox {
  position: absolute; inset: 0; z-index: 80;
  background: rgba(0,0,0,0.92); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
}
.lightbox img { max-width: 94%; max-height: 78%; border-radius: 14px; }
.lb-caption { color: var(--muted); font-size: 13.5px; font-weight: 600; text-align: center; padding: 0 20px; }
.lb-close {
  position: absolute; top: 18px; right: 18px;
  background: rgba(255,255,255,0.12); border: none; color: #fff;
  width: 38px; height: 38px; border-radius: 50%; font-size: 16px; cursor: pointer;
}

.empty {
  text-align: center; color: var(--muted); padding: 60px 30px;
  font-size: 14.5px; line-height: 1.6;
}
.empty .big { font-size: 44px; display: block; margin-bottom: 12px; }

/* mobile overrides */
html, body { background: #060608; }
#app { height: 100dvh; max-width: 640px; }
.topbar { padding-top: calc(14px + env(safe-area-inset-top)); }
.tabbar { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
.fab { bottom: calc(78px + env(safe-area-inset-bottom)); }
.brand-name { font-size: 21px; }
.backup-box {
  background: var(--card); border: 1px solid var(--line);
  border-radius: var(--radius); padding: 16px; margin-bottom: 20px;
}
.backup-box p { font-size: 13px; line-height: 1.55; color: var(--muted); }
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <span class="brand-ico">🧭</span>
      <span class="brand-name">Wanderly</span>
      <span class="diary-badge">DIARY</span>
    </div>
    <div class="top-right">
      <span class="today" id="today"></span>
      <div class="avatar">PD</div>
    </div>
  </header>
  <main>
    <section class="tab active" id="tab-trips"></section>
    <section class="tab" id="tab-timeline"></section>
    <section class="tab" id="tab-stats"></section>
  </main>
  <button class="fab" id="fab" title="Add">＋</button>
  <nav class="tabbar">
    <button class="tabbtn active" data-tab="trips"><span class="tab-ico">🧳</span>Trips</button>
    <button class="tabbtn" data-tab="timeline"><span class="tab-ico">🕰️</span>Timeline</button>
    <button class="tabbtn" data-tab="stats"><span class="tab-ico">📊</span>Stats</button>
  </nav>
  <div class="sheet hidden" id="trip-sheet">
    <div class="sheet-body" id="trip-sheet-body"></div>
  </div>
  <div class="modal-wrap hidden" id="modal">
    <div class="modal" id="modal-box"></div>
  </div>
  <div class="lightbox hidden" id="lightbox">
    <button class="lb-close" id="lb-close">✕</button>
    <img id="lb-img" alt="">
    <div class="lb-caption" id="lb-caption"></div>
  </div>
</div>

const SEED_DIARY = {"trips":[{"id":"t_seed1","title":"Bali Long Weekend","location":"Uluwatu & Canggu","country":"Indonesia","flag":"\ud83c\uddee\ud83c\udde9","emoji":"\ud83c\udf34","start":"2024-04-19","end":"2024-04-22","color":"#30d158","cover":null,"memories":[{"id":"m_seed1","date":"2024-04-19","time":"14:20","title":"Touchdown in paradise","note":"Straight from the airport to a beach club in Canggu. Watched the surfers until sunset \u2014 already never want to leave.","place":"La Brisa, Canggu","mood":"\ud83d\ude0e","photos":["s_01","s_02"]},{"id":"m_seed2","date":"2024-04-20","time":"07:00","title":"Sunrise swim","note":"Up before everyone else, had the whole pool to ourselves. Smoothie bowls after.","place":"Villa, Canggu","mood":"\ud83c\udf05","photos":["s_03"]},{"id":"m_seed3","date":"2024-04-20","time":"18:40","title":"Uluwatu temple at golden hour","note":"Monkeys stole a water bottle within five minutes. The cliff view made up for it \u2014 best sunset of the trip.","place":"Pura Luhur Uluwatu","mood":"\ud83e\udd29","photos":["s_04"]},{"id":"m_seed4","date":"2024-04-21","time":"12:30","title":"Warung lunch","note":"Nasi campur for about $3. The little places always beat the fancy ones.","place":"Warung Local, Uluwatu","mood":"\ud83c\udf5b","photos":["s_05"]},{"id":"m_seed5","date":"2024-04-22","time":"10:00","title":"Last morning beach walk","note":"Long quiet walk down Melasti before the flight home. Promised we would come back within a year.","place":"Melasti Beach","mood":"\ud83e\udd72","photos":["s_06"]}]},{"id":"t_seed2","title":"Tokyo & Kyoto in Autumn","location":"Tokyo \u00b7 Kyoto","country":"Japan","flag":"\ud83c\uddef\ud83c\uddf5","emoji":"\ud83c\udf41","start":"2024-11-22","end":"2024-11-30","color":"#ff9f0a","cover":null,"memories":[{"id":"m_seed6","date":"2024-11-22","time":"19:15","title":"First night in Shibuya","note":"Crossed the scramble four times just because. Ramen at a nine-seat counter, ordered from a vending machine like pros.", eal + the first fireworks of the weekend. Grown adults crying everywhere, us included.","place":"Mainstage","mood":"\ud83c\udf86","photos":["s_14"]},{"id":"m_seed14","date":"2025-07-26","time":"17:45","title":"Freedom Stage rave","note":"Two hours of techno under that LED ceiling. Lost the group, found better dancers.","place":"Freedom Stage","mood":"\ud83d\udd7a","photos":["s_15"]},{"id":"m_seed15","date":"2025-07-27","time":"22:00","title":"Closing set","note":"Held on until the very last note of the closing show. The lasers during the finale were the single best visual I have ever seen.","place":"Mainstage","mood":"\ud83e\udd79","photos":["s_16","s_17"]}]},{"id":"t_seed4","title":"EDC Thailand","location":"Rhythm Park, Chonburi","country":"Thailand","flag":"\ud83c\uddf9\ud83c\udded","emoji":"\u26a1","start":"2026-01-23","end":"2026-01-25","color":"#ff453a","cover":null,"memories":[{"id":"m_seed16","date":"2026-01-23","time":"18:30","title":"kineticFIELD at dusk","note":"The owl came to Thailand. Humid, loud, perfect.","place":"kineticFIELD","mood":"\ud83e\udd89","photos":["s_18"]},{"id":"m_seed17","date":"2026-01-24","time":"20:15","title":"Thai street food inside a festival","note":"Pad krapow between sets. Every festival should be catered by Thailand.","place":"Food village","mood":"\ud83c\udf36\ufe0f","photos":["s_19"]},{"id":"m_seed18","date":"2026-01-25","time":"01:30","title":"Sunrise-ish closing","note":"Legs gone, voice gone, zero regrets. Taxi back to Bangkok watching the sky go pink.","place":"Rhythm Park","mood":"\ud83d\udc80","photos":["s_20"]}]},{"id":"t_seed5","title":"Euro Summer 2026","location":"Across Europe","country":"Europe","flag":"\ud83c\uddea\ud83c\uddfa","emoji":"\u2600\ufe0f","start":"2026-06-28","end":"2026-07-24","color":"#1e7bff","cover":null,"memories":[{"id":"m_seed19","date":"2026-06-28","time":"22:10","title":"The big one begins","note":"Four weeks, one backpack each. Landed to a 26\u00b0C evening and ate outside at 10pm like locals.","place":"First stop","mood":"\ud83d\udeec","photos":["s_21"]},{"id":"m_seed20","date":"2026-07-01","time":"15:00","title":"Old town wandering","note":"No plan, no map, just followed the prettiest street each time. Found a square with live jazz and stayed two hours.","place":"Old town","mood":"\ud83c\udfb7","photos":["s_22"]},{"id":"m_seed21","date":"2026-07-04","time":"19:30","title":"Golden hour picnic","note":"Supermarket cheese, a \u20ac4 baguette and a view that restaurants would charge \u20ac200 for.","place":"Viewpoint above the city","mood":"\ud83e\uddfa","photos":["s_23"]},{"id":"m_seed22","date":"2026-07-05","time":"11:00","title":"Train day","note":"Regional train through the mountains, window down, playlist on. Travel days count as trip days when they look like this.","place":"Somewhere alpine","mood":"\ud83d\ude9e","photos":["s_24"]}]}]};

// Wanderly mobile — fully client-side travel diary.
// Diary JSON in localStorage, photo dataURLs in IndexedDB (too big for localStorage).
// SEED_DIARY / SEED_PHOTOS globals are injected by build.py for the first run.
// Backup: export/import a single JSON file from the Stats tab.

let DIARY = { trips: [] };
let PHOTOS = {}; // id -> dataURL, in-memory mirror of the IndexedDB store
let openTripId = null;

const LS_KEY = 'wanderly-diary-v1';

const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function parseDate(s) { const [y, m, d] = s.split('-').map(Number); return new Date(y, m - 1, d); }
function todayStr() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth() + 1).padStart(2, '0')}-${String(n.getDate()).padStart(2, '0')}`;
}
function fmtShort(s) { const d = parseDate(s); return `${d.getDate()} ${MONTHS[d.getMonth()].slice(0, 3)}`; }
function fmtLong(s) { const d = parseDate(s); return `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()].slice(0, 3)} ${d.getFullYear()}`; }
function fmtRange(a, b) {
  if (!a) return '';
  if (!b || a === b) return fmtLong(a);
  const da = parseDate(a), db = parseDate(b);
  const sameM = da.getMonth() === db.getMonth() && da.getFullYear() === db.getFullYear();
  const sameY = da.getFullYear() === db.getFullYear();
  if (sameM) return `${da.getDate()}–${db.getDate()} ${MONTHS[da.getMonth()].slice(0, 3)} ${da.getFullYear()}`;
  if (sameY) return `${fmtShort(a)} – ${fmtShort(b)} ${da.getFullYear()}`;
  return `${fmtShort(a)} ${da.getFullYear()} – ${fmtShort(b)} ${db.getFullYear()}`;
}
function nights(a, b) { return Math.max(1, Math.round((parseDate(b) - parseDate(a)) / 864e5)); }
function isOngoing(t) { const now = todayStr(); return t.start && t.end && t.start <= now && now <= t.end; }
function isUpcoming(t) { return t.start && t.start > todayStr(); }
function uid(prefix) { return prefix + '_' + Math.random().toString(36).slice(2, 10); }
function photoSrc(id) { return PHOTOS[id] || id; }

/* ================= Storage ================= */

function idbOpen() {
  return new Promise((ok, err) => {
    const req = indexedDB.open('wanderly', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('photos');
    req.onsuccess = () => ok(req.result);
    req.onerror = () => err(req.error);
  });
}
async function idbPut(id, dataUrl) {
  const db = await idbOpen();
  return new Promise((ok, err) => {
    const tx = db.transaction('photos', 'readwrite');
    tx.objectStore('photos').put(dataUrl, id);
    tx.oncomplete = ok; tx.onerror = () => err(tx.error);
  });
}
async function idbDelete(ids) {
  if (!ids.length) return;
  const db = await idbOpen();
  return new Promise((ok, err) => {
    const tx = db.transaction('photos', 'readwrite');
    ids.forEach(id => tx.objectStore('photos').delete(id));
    tx.oncomplete = ok; tx.onerror = () => err(tx.error);
  });
}
async function idbClear() {
  const db = await idbOpen();
  return new Promise((ok, err) => {
    const tx = db.transaction('photos', 'readwrite');
    tx.objectStore('photos').clear();
    tx.oncomplete = ok; tx.onerror = () => err(tx.error);
  });
}
async function idbAll() {
  const db = await idbOpen();
  return new Promise((ok, err) => {
    const tx = db.transaction('photos', 'readonly');
    const store = tx.objectStore('photos');
    const out = {};
    const req = store.openCursor();
    req.onsuccess = () => {
      const cur = req.result;
      if (cur) { out[cur.key] = cur.value; cur.continue(); }
      else ok(out);
    };
    req.onerror = () => err(req.error);
  });
}

function persist() { localStorage.setItem(LS_KEY, JSON.stringify(DIARY)); }

async function loadStore() {
  const raw = localStorage.getItem(LS_KEY);
  if (raw) {
    DIARY = JSON.parse(raw);
    PHOTOS = await idbAll();
  } else {
    DIARY = JSON.parse(JSON.stringify(SEED_DIARY));
    PHOTOS = { ...SEED_PHOTOS };
    for (const [id, d] of Object.entries(SEED_PHOTOS)) await idbPut(id, d);
    persist();
  }
}

// Photo ids referenced anywhere in the diary
function referencedPhotoIds(diary) {
  const s = new Set();
  for (const t of diary.trips) {
    if (t.cover) s.add(t.cover);
    for (const m of t.memories) for (const p of m.photos) s.add(p);
  }
  return s;
}
async function pruneOrphanPhotos() {
  const used = referencedPhotoIds(DIARY);
  const orphans = Object.keys(PHOTOS).filter(id => !used.has(id));
  orphans.forEach(id => delete PHOTOS[id]);
  await idbDelete(orphans);
}

/* ================= Mutations ================= */

async function addTrip(data) {
  const trip = { id: uid('t'), memories: [], cover: null, ...data };
  DIARY.trips.push(trip);
  persist();
  renderAll();
  return trip;
}
async function addMemory(tripId, mem) {
  const trip = DIARY.trips.find(t => t.id === tripId);
  if (!trip) throw new Error('trip not found');
  mem.id = uid('m');
  trip.memories.push(mem);
  if (!trip.cover && mem.photos.length) trip.cover = mem.photos[0];
  persist();
  renderAll();
}
async function deleteMemory(memId) {
  for (const t of DIARY.trips) {
    const i = t.memories.findIndex(m => m.id === memId);
    if (i >= 0) {
      const [rm] = t.memories.splice(i, 1);
      if (rm.photos.includes(t.cover)) t.cover = t.memories.flatMap(m => m.photos)[0] || null;
      await pruneOrphanPhotos();
      persist();
      renderAll();
      return;
    }
  }
}
async function deleteTrip(tripId) {
  const i = DIARY.trips.findIndex(t => t.id === tripId);
  if (i < 0) return;
  DIARY.trips.splice(i, 1);
  await pruneOrphanPhotos();
  persist();
  renderAll();
}

// Downscale + store chosen files, return photo ids
async function uploadPhotos(files) {
  const ids = [];
  for (const f of files) {
    const dataUrl = await new Promise((ok, err) => {
      const r = new FileReader();
      r.onload = () => ok(r.result);
      r.onerror = err;
      r.readAsDataURL(f);
    });
    const resized = await new Promise(ok => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1280;
        const scale = Math.min(1, MAX / Math.max(img.width, img.height));
        const cv = document.createElement('canvas');
        cv.width = Math.round(img.width * scale);
        cv.height = Math.round(img.height * scale);
        cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
        ok(cv.toDataURL('image/jpeg', 0.8));
      };
      img.onerror = () => ok(dataUrl);
      img.src = dataUrl;
    });
    const id = uid('p');
    await idbPut(id, resized);
    PHOTOS[id] = resized;
    ids.push(id);
  }
  return ids;
}

/* ================= Backup ================= */

function exportBackup() {
  const payload = { app: 'wanderly', version: 1, exported: new Date().toISOString(), trips: DIARY.trips, photos: PHOTOS };
  const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `wanderly-backup-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function importBackup(file) {
  const text = await file.text();
  const data = JSON.parse(text);
  if (!Array.isArray(data.trips)) throw new Error('not a Wanderly backup (no trips array)');
  if (!confirm(`Replace everything with this backup?\n${data.trips.length} trips, exported ${data.exported ? data.exported.slice(0, 10) : 'unknown'}.`)) return;
  DIARY = { trips: data.trips };
  PHOTOS = data.photos || {};
  await idbClear();
  for (const [id, d] of Object.entries(PHOTOS)) await idbPut(id, d);
  persist();
  renderAll();
  alert('Backup restored.');
}

/* ================= Timeline tab ================= */

function allMemories() {
  const out = [];
  for (const t of DIARY.trips)
    for (const m of t.memories)
      if (m.date && m.date <= todayStr()) out.push({ t, m });
  out.sort((a, b) => b.m.date.localeCompare(a.m.date) || (b.m.time || '').localeCompare(a.m.time || ''));
  return out;
}

function onThisDay() {
  const now = new Date();
  const mmdd = `${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
  return allMemories().filter(({ m }) =>
    m.date.slice(5) === mmdd && m.date.slice(0, 4) !== String(now.getFullYear()));
}

function renderTimeline() {
  const el = $('#tab-timeline');
  const items = allMemories();
  if (!items.length) {
    el.innerHTML = `<div class="empty"><span class="big">🕰️</span>Your timeline is empty.<br>Memories from every trip will appear here, newest first.</div>`;
    return;
  }
  let html = '';

  const otd = onThisDay();
  if (otd.length) {
    const { t, m } = otd[0];
    const yrs = new Date().getFullYear() - Number(m.date.slice(0, 4));
    html += `<div class="otd" data-trip="${t.id}">
      <div class="otd-head">✨ On this day</div>
      <div class="otd-body">${yrs} year${yrs > 1 ? 's' : ''} ago — ${esc(m.title)} <span>· ${esc(t.title)}</span></div>
    </div>`;
  }

  let lastMonth = '';
  for (const { t, m } of items) {
    const d = parseDate(m.date);
    const monthKey = `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
    if (monthKey !== lastMonth) {
      html += `<div class="tl-month">${monthKey}</div>`;
      lastMonth = monthKey;
    }
    const thumb = m.photos[0];
    html += `
    <div class="tl-row">
      <div class="tl-rail">
        <div class="mem-dot" style="border-color:${esc(t.color)}"></div>
        <div class="mem-line"></div>
      </div>
      <div class="tl-card" data-trip="${t.id}">
        ${thumb ? `<img class="tl-thumb" src="${esc(photoSrc(thumb))}" alt="">` : `<div class="tl-thumb-ph">${esc(m.mood || t.emoji)}</div>`}
        <div class="tl-info">
          <div class="tl-date">${fmtLong(m.date)}${m.time ? ' · ' + esc(m.time) : ''}</div>
          <div class="tl-title">${esc(m.title)}</div>
          ${m.note ? `<div class="tl-note">${esc(m.note)}</div>` : ''}
          <span class="tl-trip"><span class="swatch" style="background:${esc(t.color)}"></span>${esc(t.emoji)} ${esc(t.title)}</span>
        </div>
      </div>
    </div>`;
  }
  el.innerHTML = html;
  el.querySelectorAll('[data-trip]').forEach(c =>
    c.addEventListener('click', () => openTrip(c.dataset.trip)));
}

/* ================= Stats tab ================= */

function renderStats() {
  const el = $('#tab-stats');
  const trips = DIARY.trips;
  const backupHtml = `
    <div class="section-title">Backup</div>
    <div class="backup-box">
      <p>Everything lives on this phone (localStorage + IndexedDB). Export a JSON backup now and then — restoring it on any device brings the whole diary back, photos included.</p>
      <div class="modal-btns" style="margin-top:12px">
        <button class="btn btn-ghost" id="import-btn">Import backup</button>
        <button class="btn btn-primary" id="export-btn">Export backup</button>
      </div>
      <input id="import-file" type="file" accept="application/json" style="display:none">
    </div>`;
  if (!trips.length) {
    el.innerHTML = `<div class="empty"><span class="big">📊</span>Stats appear once you log your first trip.</div>` + backupHtml;
    wireBackup();
    return;
  }
  const memories = trips.flatMap(t => t.memories);
  const photos = memories.flatMap(m => m.photos);
  const started = trips.filter(t => t.start && t.start <= todayStr());
  const days = started.reduce((n, t) => {
    if (!t.start) return n;
    const end = (t.end && t.end <= todayStr()) ? t.end : todayStr();
    return n + nights(t.start, end) + 1;
  }, 0);
  const countries = {};
  for (const t of started) {
    if (!t.country) continue;
    countries[t.country] = countries[t.country] || { flag: t.flag, n: 0 };
    countries[t.country].n++;
  }

  const byYear = {};
  for (const m of memories) {
    if (!m.date || m.date > todayStr()) continue;
    const y = m.date.slice(0, 4);
    byYear[y] = (byYear[y] || 0) + 1;
  }
  const years = Object.keys(byYear).sort();
  const maxY = Math.max(...Object.values(byYear), 1);

  el.innerHTML = `
    <div class="section-title">All time</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="n">${started.length}</div><div class="l">Trips</div></div>
      <div class="stat-card"><div class="n">${Object.keys(countries).length}</div><div class="l">Countries</div></div>
      <div class="stat-card"><div class="n">${days}</div><div class="l">Days travelling</div></div>
      <div class="stat-card"><div class="n">${memories.length}</div><div class="l">Memories</div></div>
      <div class="stat-card"><div class="n">${photos.length}</div><div class="l">Photos</div></div>
      <div class="stat-card"><div class="n">${memories.length ? (memories.length / Math.max(started.length, 1)).toFixed(1) : 0}</div><div class="l">Memories / trip</div></div>
    </div>
    <div class="section-title">Memories per year</div>
    <div>${years.map(y => `
      <div class="bar-row">
        <span class="bar-label">${y}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(byYear[y] / maxY * 100)}%"></div></div>
        <span class="bar-n">${byYear[y]}</span>
      </div>`).join('')}</div>
    <div class="section-title">Countries</div>
    ${Object.entries(countries).sort((a, b) => b[1].n - a[1].n).map(([name, c]) => `
      <div class="country-row">
        <span class="country-flag">${esc(c.flag)}</span>
        <span class="country-name">${esc(name)}</span>
        <span class="country-n">${c.n} trip${c.n > 1 ? 's' : ''}</span>
      </div>`).join('')}
    ${backupHtml}
  `;
  wireBackup();
}

function wireBackup() {
  $('#export-btn').addEventListener('click', exportBackup);
  $('#import-btn').addEventListener('click', () => $('#import-file').click());
  $('#import-file').addEventListener('change', async e => {
    const f = e.target.files[0];
    if (!f) return;
    try { await importBackup(f); }
    catch (err) { alert('Import failed: ' + err.message); }
    e.target.value = '';
  });
}

    <div class="field"><label>What happened?</label><input id="f-title" placeholder="e.g. Sunset at the old harbour"></div>
    <div class="field-row">
      <div class="field"><label>Date</label><input id="f-date" type="date" value="${todayStr()}"></div>
      <div class="field"><label>Time</label><input id="f-time" type="time"></div>
    </div>
    <div class="field"><label>Place</label><input id="f-place" placeholder="e.g. Nyhavn, Copenhagen"></div>
    <div class="field"><label>The story</label><textarea id="f-note" placeholder="What do you want to remember about this?"></textarea></div>
    <div class="field"><label>Mood</label><div class="emoji-opts">
      ${MOODS.map(e => `<button class="emoji-opt" data-e="${e}">${e}</button>`).join('')}
    </div></div>
    <div class="field"><label>Photos</label>
      <div class="photo-drop" id="f-drop">📷 Tap to add photos</div>
      <input id="f-files" type="file" accept="image/*" multiple style="display:none">
      <div class="photo-previews" id="f-previews"></div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-ghost" id="f-cancel">Cancel</button>
      <button class="btn btn-primary" id="f-save">Save memory</button>
    </div>
  `);
  let mood = '';
  let files = [];
  document.querySelectorAll('.emoji-opt').forEach(b => b.addEventListener('click', () => {
    const was = b.classList.contains('sel');
    document.querySelectorAll('.emoji-opt').forEach(x => x.classList.remove('sel'));
    if (!was) { b.classList.add('sel'); mood = b.dataset.e; } else mood = '';
  }));
  $('#f-drop').addEventListener('click', () => $('#f-files').click());
  $('#f-files').addEventListener('change', e => {
    files = [...e.target.files];
    $('#f-previews').innerHTML = '';
    files.forEach(f => {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(f);
      $('#f-previews').appendChild(img);
    });
    $('#f-drop').textContent = `📷 ${files.length} photo${files.length > 1 ? 's' : ''} selected — tap to change`;
  });
  $('#f-cancel').addEventListener('click', hideModal);
  $('#f-save').addEventListener('click', async () => {
    const title = $('#f-title').value.trim();
    if (!title) { $('#f-title').focus(); return; }
    const btn = $('#f-save');
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      const photos = files.length ? await uploadPhotos(files) : [];
      await addMemory($('#f-trip').value, {
        title,
        date: $('#f-date').value,
        time: $('#f-time').value || null,
        place: $('#f-place').value.trim(),
        note: $('#f-note').value.trim(),
        mood, photos,
      });
      hideModal();
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Save memory';
      alert('Could not save: ' + err.message);
    }
  });
}

/* ================= Lightbox / nav / boot ================= */

function showLightbox(src, caption) {
  $('#lb-img').src = src;
  $('#lb-caption').textContent = caption || '';
  $('#lightbox').classList.remove('hidden');
}
$('#lb-close').addEventListener('click', () => $('#lightbox').classList.add('hidden'));
$('#lightbox').addEventListener('click', e => {
  if (e.target.id === 'lightbox') $('#lightbox').classList.add('hidden');
});

document.querySelectorAll('.tabbtn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tabbtn').forEach(x => x.classList.toggle('active', x === b));
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === 'tab-' + b.dataset.tab));
  closeSheet();
}));

$('#fab').addEventListener('click', () => {
  if (openTripId) showMemoryModal(openTripId);
  else if (DIARY.trips.length) showMemoryModal(null);
  else showTripModal();
});
$('#fab').addEventListener('contextmenu', e => { e.preventDefault(); showTripModal(); });
let fabTimer = null;
$('#fab').addEventListener('pointerdown', () => { fabTimer = setTimeout(showTripModal, 550); });
$('#fab').addEventListener('pointerup', () => clearTimeout(fabTimer));
$('#fab').addEventListener('pointerleave', () => clearTimeout(fabTimer));

$('#modal').addEventListener('click', e => { if (e.target.id === 'modal') hideModal(); });

const now = new Date();
$('#today').textContent = `${DAYS[now.getDay()]} ${now.getDate()} ${MONTHS[now.getMonth()].slice(0, 3)}`;

loadStore().then(renderAll).catch(err => {
  $('#tab-trips').innerHTML = `<div class="empty"><span class="big">⚠️</span>Could not load diary: ${esc(err.message)}</div>`;
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

</script>
</body>
</html>
